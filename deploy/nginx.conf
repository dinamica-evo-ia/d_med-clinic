server {
    listen 8080;
    server_name www.dmedclinic.com.br dmedclinic.com.br;

    root /app/public;
    index index.php;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # PWA — dois tipos que o nginx não conhece e serviria como application/octet-stream.
    # Com o "X-Content-Type-Options: nosniff" acima, o navegador NÃO adivinha: ele rejeita
    # o manifest e o app deixa de ser instalável. Por isso o tipo vai explícito aqui.
    location = /manifest.webmanifest {
        default_type application/manifest+json;
    }

    # Service worker: no-cache para o navegador pegar versão nova na hora (SW cacheado
    # atrasa atualização). Fica na raiz de propósito — só assim controla o escopo "/".
    location = /sw.js {
        default_type application/javascript;
        add_header Cache-Control "no-cache";
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 120;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Assets cache
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /storage/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    access_log /dev/stdout;
    error_log /dev/stderr;
}
